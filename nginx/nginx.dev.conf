# OpenBanner — LOCAL DEV nginx
# Single HTTP server on :80 that serves the UI static files and reverse-proxies the
# render API onto the SAME origin (so the browser makes same-origin calls => no CORS).
# Deliberately no TLS, no server_name, no limit_req (dev only — do not ship this).

user nginx;
worker_processes auto;
events { worker_connections 1024; }

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    server_tokens off;
    keepalive_timeout 65;

    upstream render_api { server rendering-api:3000; }

    server {
        listen 80;
        # no server_name — matches any host (localhost, 127.0.0.1, LAN IP)

        root /usr/share/nginx/html;
        index index.html;

        # >= API BODY_LIMIT so uploaded inline-image templates/renders aren't truncated.
        client_max_body_size 13m;

        # ---- API reverse proxy (longest-prefix/exact match wins over `location /`) ----
        location /v1/ {
            proxy_pass http://render_api;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location = /healthz { proxy_pass http://render_api; }
        location = /readyz  { proxy_pass http://render_api; }
        location = /metrics { proxy_pass http://render_api; }

        # ---- UI static assets + SPA fallback ----
        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}
